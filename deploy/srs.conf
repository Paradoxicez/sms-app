listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_file        ./objs/logs/srs.log;

http_server {
    enabled         on;
    listen          8080;
}

http_api {
    enabled         on;
    listen          1985;
    # ClusterController.reload (POST /api/cluster/nodes/:id/reload) calls
    # /api/v1/raw?rpc=reload via SrsApiService for ORIGIN nodes. Without the
    # raw_api block SRS returns code=1061 and the reload silently fails,
    # leaving the running process out of sync with the on-disk config until
    # the container is manually restarted.
    raw_api {
        enabled         on;
        allow_reload    on;
    }
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      6;
        hls_cleanup     on;
        hls_dispose     30;
        hls_wait_keyframe on;
        hls_ctx         on;
        hls_ts_ctx      on;
    }

    http_hooks {
        enabled         on;
        on_publish      http://api:3003/api/srs/callbacks/on-publish;
        on_unpublish    http://api:3003/api/srs/callbacks/on-unpublish;
        on_play         http://api:3003/api/srs/callbacks/on-play;
        on_stop         http://api:3003/api/srs/callbacks/on-stop;
        on_hls          http://api:3003/api/srs/callbacks/on-hls;
        on_dvr          http://api:3003/api/srs/callbacks/on-dvr;
    }

    # Phase 19.1 D-18: RTMP push → live remap via backend hook.
    # SRS posts to this URL for every publish and expects
    # { code: 0, data: { urls: ["rtmp://..."] } } in response.
    # Backend returns:
    #   app=push + passthrough → rtmp://127.0.0.1:1935/live/{orgId}/{cameraId}
    #   app=push + transcode   → empty (FFmpeg handles forward)
    #   app=live               → empty (recursion guard)
    forward {
        enabled         on;
        backend         http://api:3003/api/srs/callbacks/on-forward;
    }

    rtc {
        enabled     on;
        rtmp_to_rtc on;
    }
}
